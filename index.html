<style>
*{ margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
}

/* ══ FUNDO ANIMADO ══ */
body {
  background: url('https://raw.githubusercontent.com/ohnitenR/RAVI-KIDS-01/main/OK%20%2001%20.jpg') center center / cover no-repeat;
  transition: background-position 0.1s ease-out;
}

/* Overlay escuro suave */
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.22);
  z-index:1; pointer-events:none;
}

/* Canvas bolhas */
#bolhas {
  position:fixed; inset:0;
  z-index:2; pointer-events:none;
}

/* ══ LAYOUT PRINCIPAL ══ */
#appUsuario {
  position:relative; z-index:3;
  display:flex; flex-direction:column;
  height:100vh; width:100%;
}

/* ══ ÁREA CENTRAL: player + canais ══ */
#mainArea {
  display:flex; flex:1; overflow:hidden;
}

/* ══ PLAYER AREA — ocupa todo espaço disponível ══ */
#playerArea {
  flex:1; display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0;
  position:relative; z-index:5;
}

/* Player wrap ocupa 100% da área */
#playerArea #playerWrap {
  width:100% !important;
  max-width:100% !important;
}
#playerArea #ytplayer {
  width:100% !important;
  height:calc(100vh - 230px) !important;
}

/* ══ RIGHTBAR: 3 colunas de canais ══ */
#canaisArea {
  width:320px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-left:1px solid rgba(255,255,255,0.35);
  border-top:1px solid rgba(255,255,255,0.5);
  box-shadow: inset 0 0 30px rgba(255,255,255,0.05),
              -4px 0 24px rgba(0,0,0,0.2);
  padding:14px 10px;
  overflow-y:auto;
  overflow-x:hidden;
  position:relative; z-index:5;
  flex-shrink:0;
}
#canaisArea h4 {
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,0.8);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:10px;
}
/* Grid 3 colunas */
#channelList {
  display:grid !important;
  grid-template-columns: repeat(3,1fr) !important;
  gap:8px !important;
}


/* ══ MOLDURA ANIMADA DO PLAYER ══ */
#playerMoldura {
  position:relative;
  width:858px;
  height:483px;
  border-radius:14px;
  padding:4px;
  background: linear-gradient(90deg,
    #ff4d6d, #ff9a3c, #c9f53b, #3cf5c9,
    #3c9ff5, #c93cf5, #ff4d6d);
  background-size:400% 400%;
  animation:molduraGlow 4s ease infinite;
  box-shadow:
    0 0 18px rgba(201,245,59,0.5),
    0 0 35px rgba(255,77,109,0.35),
    0 0 60px rgba(60,159,245,0.25);
}
@keyframes molduraGlow {
  0%  { background-position:0% 50%;   box-shadow:0 0 18px rgba(201,245,59,0.6),0 0 40px rgba(255,77,109,0.4); }
  50% { background-position:100% 50%; box-shadow:0 0 25px rgba(60,159,245,0.7),0 0 50px rgba(201,245,59,0.5); }
  100%{ background-position:0% 50%;   box-shadow:0 0 18px rgba(255,77,109,0.6),0 0 40px rgba(60,159,245,0.4); }
}
/* Inner da moldura */
#playerMoldura::before {
  content:'';
  position:absolute;
  inset:4px;
  border-radius:11px;
  background:#000;
  z-index:0;
}
#playerMoldura #playerWrap {
  position:relative;
  z-index:1;
  border-radius:10px;
  overflow:hidden;
}

/* ══ CONTROLES FORA DA MOLDURA ══ */
#controlesPlayer {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-top:14px;
  position:relative;
  z-index:5;
}
#controlesPlayer button {
  background:linear-gradient(135deg,rgba(255,77,109,0.82),rgba(255,154,60,0.82));
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.35);
  color:white;
  border-radius:25px;
  padding:10px 22px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(255,77,109,0.45), 0 2px 8px rgba(0,0,0,0.2);
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}
#controlesPlayer button:hover {
  transform:translateY(-4px) scale(1.08);
  box-shadow:0 8px 22px rgba(255,77,109,0.6);
}
#controlesPlayer #btnFullscreen2 {
  background:linear-gradient(135deg,#3c9ff5,#c93cf5);
  box-shadow:0 4px 15px rgba(60,159,245,0.4);
}
#controlesPlayer #btnFullscreen2:hover {
  box-shadow:0 8px 22px rgba(60,159,245,0.6);
}

<script>
// ══ FIREBASE ══
const ADMIN_SENHA = 'KidsPro@2025';

const auth = firebase.auth();

let modoAdmin=false,usuarioAtual=null,planoAtivo='trial',planoSelecionado='trimestral';
let approvedVideos=[],currentChannelId=null,currentIndex=0,currentVideoId=null;
let buscaCancelada=false,canalAtualId=null,canalAtualTitle=null,canalAtualItems=[];
const channelCache={};

/* ═══════════════════════════
   🎬 PLAYER — YT API OFICIAL
═══════════════════════════ */
let player;
let playerPronto = false;
let videoParaTocar = null;



// ══ PARALLAX FUNDO ══
document.addEventListener('mousemove', function(e){
  const x = (e.clientX / window.innerWidth  - 0.5) * 30;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;
  document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
});

// ══ BOLHAS ANIMADAS ══
(function(){
  const canvas = document.getElementById('bolhas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  const bolhas = Array.from({length:22}, ()=>{
    return {
      x:     Math.random()*canvas.width,
      y:     canvas.height + Math.random()*canvas.height,
      r:     Math.random()*40+10,
      speed: Math.random()*1.2+0.4,
      drift: (Math.random()-0.5)*0.6,
      alpha: Math.random()*0.25+0.07,
      hue:   Math.floor(Math.random()*360)
    };
  });
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bolhas.forEach(b=>{
      b.y -= b.speed; b.x += b.drift; b.hue += 0.5;
      if(b.y+b.r<0){ b.y=canvas.height+b.r; b.x=Math.random()*canvas.width; }
      if(b.x-b.r>canvas.width) b.x=-b.r;
      if(b.x+b.r<0) b.x=canvas.width+b.r;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      const g=ctx.createRadialGradient(b.x-b.r*.35,b.y-b.r*.35,b.r*.05,b.x,b.y,b.r);
      g.addColorStop(0,`hsla(${b.hue},100%,98%,${b.alpha*2.5})`);
      g.addColorStop(0.4,`hsla(${b.hue},80%,80%,${b.alpha})`);
      g.addColorStop(1,`hsla(${b.hue},60%,60%,0)`);
      ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle=`hsla(${b.hue},100%,95%,${b.alpha*1.5})`; ctx.lineWidth=1.2; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.35,b.r*.18,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${b.alpha*2})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function onYouTubeIframeAPIReady(){
  player = new YT.Player('ytplayer',{
    height:'360',
    width:'640',
    playerVars:{
      rel:0,
      modestbranding:1,
      iv_load_policy:3,
      fs:0
    },
    events:{
      'onStateChange': onPlayerStateChange,
      'onReady': function(){ playerPronto=true; if(videoParaTocar){ player.loadVideoById(videoParaTocar); videoParaTocar=null; } }
    }
  });
}
let _monitorInterval=null;
function _iniciarMonitor(){
  if(_monitorInterval)clearInterval(_monitorInterval);
  _monitorInterval=setInterval(()=>{
    if(!player||!player.getDuration)return;
    const dur=player.getDuration();
    const cur=player.getCurrentTime();
    if(dur>0&&cur>0&&(dur-cur)<=3){
      clearInterval(_monitorInterval);
      _monitorInterval=null;
      player.stopVideo();
      proximoVideo();
    }
  },500);
}
function _pararMonitor(){ if(_monitorInterval){clearInterval(_monitorInterval);_monitorInterval=null;} }
function resumirVideo(){ document.getElementById('ytPausaOverlay').style.display='none'; if(player&&player.playVideo)player.playVideo(); }
function onPlayerStateChange(event){
  const po=document.getElementById('ytPausaOverlay');
  if(event.data===YT.PlayerState.PLAYING){ po.style.display='none'; _iniciarMonitor(); }
  else if(event.data===YT.PlayerState.PAUSED){ po.style.display='block'; _pararMonitor(); }
  else if(event.data===YT.PlayerState.ENDED){ po.style.display='none'; _pararMonitor(); proximoVideo(); }
}
function carregarVideoNoPlayer(videoId, titulo){
  if(!videoId) return;
  currentVideoId = videoId;
  if(playerPronto && player && player.loadVideoById){
    player.loadVideoById(videoId);
  } else {
    videoParaTocar = videoId;
  }
  const t = titulo || videoId;
  document.getElementById('nowPlayingBar').innerText = '▶ ' + t;
  document.querySelectorAll('.footer-card').forEach(c=>c.classList.toggle('footer-card-ativo',c.dataset.vid===videoId));
}
function playApproved(id){
  showSection('player');
  const video=approvedVideos.find(v=>v.id===id);
  const titulo=video?video.title:id;
  const lista=currentChannelId?approvedVideos.filter(v=>v.channelId===currentChannelId):approvedVideos;
  const idx=lista.findIndex(v=>v.id===id);
  if(idx!==-1)currentIndex=idx;
  carregarVideoNoPlayer(id,titulo);
}
function proximoVideo(){
  const lista=currentChannelId?approvedVideos.filter(v=>v.channelId===currentChannelId):approvedVideos;
  if(!lista.length)return;
  currentIndex=(currentIndex+1)%lista.length;
  playApproved(lista[currentIndex].id);
}
function anteriorVideo(){
  const lista=currentChannelId?approvedVideos.filter(v=>v.channelId===currentChannelId):approvedVideos;
  if(!lista.length)return;
  currentIndex=(currentIndex-1+lista.length)%lista.length;
  playApproved(lista[currentIndex].id);
}
function toggleFullscreen(){
  const wrap=document.getElementById('playerWrap');
  const btn=document.getElementById('btnFullscreen');
  const exitBtn=document.getElementById('btnExitFs');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    if(wrap.requestFullscreen) wrap.requestFullscreen();

    btn.innerText='✕';

    if(document.exitFullscreen) document.exitFullscreen();

}

/* ── ALGORITMO PODEROSO ── resolve qualquer entrada e usa playlistItems para furar limite ── */

async function resolverCanalId(query){
  // link de vídeo → pega channelId do vídeo
  const vidMatch=query.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if(vidMatch){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${vidMatch[1]}&key=${apiKey}`).then(r=>r.json());
    if(r.items&&r.items.length) return {cid:r.items[0].snippet.channelId,titulo:r.items[0].snippet.channelTitle,videoAvulso:{id:vidMatch[1],title:r.items[0].snippet.title,channelId:r.items[0].snippet.channelId,channelTitle:r.items[0].snippet.channelTitle}};
  }
  // ID direto UC...
  if(/^UC[A-Za-z0-9_-]{22}$/.test(query)){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${query}&key=${apiKey}`).then(r=>r.json());
    if(r.items&&r.items.length) return {cid:query,titulo:r.items[0].snippet.title};
  }
  // link com /channel/UC...
  const chanMatch=query.match(/youtube\.com\/channel\/(UC[A-Za-z0-9_-]{22})/);
  if(chanMatch){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${chanMatch[1]}&key=${apiKey}`).then(r=>r.json());
    if(r.items&&r.items.length) return {cid:chanMatch[1],titulo:r.items[0].snippet.title};
  }
  // @handle via forHandle
  const handleMatch=query.match(/(?:youtube\.com\/)?@([A-Za-z0-9_.-]+)/);
  if(handleMatch){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=@${handleMatch[1]}&key=${apiKey}`).then(r=>r.json());
    if(r.items&&r.items.length) return {cid:r.items[0].id,titulo:r.items[0].snippet.title};
  }
  // /c/nome ou /user/nome
  const customMatch=query.match(/youtube\.com\/(?:c\/|user\/)([^/?&]+)/);
  if(customMatch){
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&forUsername=${customMatch[1]}&key=${apiKey}`).then(r=>r.json());
    if(r.items&&r.items.length) return {cid:r.items[0].id,titulo:r.items[0].snippet.title};
  }
  // busca por nome → tenta canal primeiro
  const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(query)}&maxResults=1&key=${apiKey}`).then(r=>r.json());
  if(sr.items&&sr.items.length){
    const cid=sr.items[0].id.channelId;
    const info=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${cid}&key=${apiKey}`).then(r=>r.json());
    const titulo=info.items&&info.items.length?info.items[0].snippet.title:sr.items[0].snippet.title;
    return {cid,titulo};
  }
  return null;
}

async function getUploadPlaylistId(cid){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${cid}&key=${apiKey}`).then(r=>r.json());
  if(r.items&&r.items.length) return r.items[0].contentDetails.relatedPlaylists.uploads;
  return null;
}

async function carregarVideosCanal(cid,titulo){
  const resDiv=document.getElementById('results');
  const pb=document.getElementById('progressBar');
  const pl=document.getElementById('progressLabel');
  document.getElementById('progressBlock').style.display='block';
  buscaCancelada=false;
  canalAtualItems=[];

  const uploadPid=await getUploadPlaylistId(cid);
  if(!uploadPid){ resDiv.innerHTML='❌ Não encontrei a playlist de uploads.'; document.getElementById('progressBlock').style.display='none'; return; }

  let nextToken='',count=0;
  while(count<LIMITE_VIDEOS&&!buscaCancelada){
    const url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPid}&maxResults=50&key=${apiKey}${nextToken?'&pageToken='+nextToken:''}`;
    const r=await fetch(url).then(r=>r.json());
    if(!r.items||!r.items.length) break;
    for(const item of r.items){
      const vid=item.snippet.resourceId.videoId;
      const vtitle=item.snippet.title;
      if(vid&&vtitle&&vtitle!=='Deleted video'&&vtitle!=='Private video'){
        canalAtualItems.push({id:vid,title:vtitle,channelId:cid,channelTitle:titulo});
        count++;
      }
    }
    pb.value=Math.min((count/LIMITE_VIDEOS)*100,99);
    pl.innerText=`🔄 Carregando vídeos: ${count}...`;
    nextToken=r.nextPageToken;
    if(!nextToken) break;
  }
  document.getElementById('progressBlock').style.display='none';

  resDiv.innerHTML='';
  const btnC=document.getElementById('btnAprovarCanal');
  btnC.style.display='block';
  btnC.innerText=`✅ Aprovar Canal Inteiro: ${titulo} (${canalAtualItems.length} vídeos)`;
  btnC.className=approvedVideos.some(v=>v.channelId===cid)?'canal-aprovado':'';
  canalAtualItems.forEach(v=>resDiv.appendChild(createVideoRow(v)));
}

async function searchVideos(){
  const query=document.getElementById('searchInput').value.trim();
  if(!query)return;
  const resDiv=document.getElementById('results');
  resDiv.innerHTML='🔍 Analisando entrada...';
  document.getElementById('btnAprovarCanal').style.display='none';
  document.getElementById('progressBlock').style.display='none';

  // PASSO 1 — detectar tipo de entrada
  const resolved=await resolverCanalId(query);

  if(resolved&&resolved.videoAvulso){
    // vídeo avulso → mostra só o vídeo mas com canal acessível
    canalAtualId=resolved.cid;
    canalAtualTitle=resolved.titulo;
    resDiv.innerHTML='';
    resDiv.appendChild(createVideoRow(resolved.videoAvulso));
    const btnC=document.getElementById('btnAprovarCanal');
    btnC.style.display='block';
    btnC.innerText=`📺 Ver todos do canal: ${resolved.titulo}`;
    btnC.className='';
    btnC.onclick=()=>{ carregarVideosCanal(canalAtualId,canalAtualTitle); btnC.onclick=aprovarCanalInteiro; };
    return;
  }

  if(resolved){
    canalAtualId=resolved.cid;
    canalAtualTitle=resolved.titulo;
    // PASSO 2+3 — Algoritmo Poderoso com playlistItems
    await carregarVideosCanal(resolved.cid,resolved.titulo);
    return;
  }

  // fallback — busca por vídeos por nome
  resDiv.innerHTML='🔍 Buscando vídeos...';
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&key=${apiKey}`).then(r=>r.json());
  resDiv.innerHTML='';
  (r.items||[]).forEach(item=>{
    const v={id:item.id.videoId,title:item.snippet.title,channelId:item.snippet.channelId,channelTitle:item.snippet.channelTitle};
    resDiv.appendChild(createVideoRow(v));
  });
}

function createVideoRow(v){
  const div=document.createElement('div');
  div.className='video-item';
  const isAp=approvedVideos.some(av=>av.id===v.id);
  div.innerHTML=`<span>${v.title}</span><button class="btn-aprovar ${isAp?'btn-aprovado':''}" onclick="toggleAprovar('${v.id}','${v.title.replace(/'/g,'').replace(/"/g,'')}','${v.channelId}','${v.channelTitle.replace(/'/g,'').replace(/"/g,'')}',this)">${isAp?'✅ Aprovado':'Aprovar'}</button>`;
  return div;
}

async function aprovarCanalInteiro(){
  if(!canalAtualId)return;
  const btn=document.getElementById('btnAprovarCanal');
  if(btn.classList.contains('canal-aprovado'))return;
  buscaCancelada=false;
  document.getElementById('progressBlock').style.display='block';
  const pb=document.getElementById('progressBar');
  const pl=document.getElementById('progressLabel');

  const uploadPid=await getUploadPlaylistId(canalAtualId);
  if(!uploadPid){ alert('Não encontrei playlist de uploads.'); document.getElementById('progressBlock').style.display='none'; return; }

  let nextToken='',count=0;
  while(count<LIMITE_VIDEOS&&!buscaCancelada){
    const url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPid}&maxResults=50&key=${apiKey}${nextToken?'&pageToken='+nextToken:''}`;
    const r=await fetch(url).then(r=>r.json());
    if(!r.items||!r.items.length) break;
    for(const item of r.items){
      const vid=item.snippet.resourceId.videoId;
      const vtitle=item.snippet.title;
      if(vid&&vtitle&&vtitle!=='Deleted video'&&vtitle!=='Private video'){
        if(!approvedVideos.some(av=>av.id===vid)){
          const v={id:vid,title:vtitle,channelId:canalAtualId,channelTitle:canalAtualTitle};
          approvedVideos.push(v);
          await salvarVideoFirestore(v);
        }
        count++;
      }
    }
    pb.value=Math.min((count/LIMITE_VIDEOS)*100,99);
    pl.innerText=`✅ Aprovando: ${count} vídeos...`;
    nextToken=r.nextPageToken;
    if(!nextToken) break;
  }
  document.getElementById('progressBlock').style.display='none';
  btn.innerText=`✅ Canal Aprovado! (${count} vídeos)`;
  btn.classList.add('canal-aprovado');
  updateStats(); renderChannels();
  renderApprovedSection(); renderFooterVideos(canalAtualId);
}

      <div class="play-icon">▶</div>
      <div class="card-info">
        <div class="card-titulo">${v.title}</div>
        <button class="btn-apagar" onclick="event.stopPropagation();deletarVideo('${v.id}')">🗑 Apagar Vídeo</button>
        <button class="btn-apagar" onclick="event.stopPropagation();deletarCanal('${v.channelId}')" style="margin-top:4px;font-size:10px;">🗑 Apagar Canal</button>
      </div>`;
    card.onclick=()=>{ currentIndex=idx; playApproved(v.id); };
    list.appendChild(card);
  });
}

async function deletarVideo(id){
  if(!confirm('Remover este vídeo?'))return;
  approvedVideos=approvedVideos.filter(v=>v.id!==id);
  await deletarVideoFirestore(id);
  renderChannels(); renderApprovedSection(); updateStats();
  renderFooterVideos(currentChannelId);
}

async function deletarCanal(channelId){
  if(!confirm('Remover todos os vídeos deste canal?'))return;
  const ids=approvedVideos.filter(v=>v.channelId===channelId).map(v=>v.id);
  approvedVideos=approvedVideos.filter(v=>v.channelId!==channelId);
  for(const id of ids){ await deletarVideoFirestore(id); }
  if(currentChannelId===channelId)currentChannelId=null;
  renderChannels(); renderApprovedSection(); updateStats();
  renderFooterVideos(currentChannelId);
}

function renderFooterVideos(cid){
  currentChannelId=cid;
  currentIndex=0;
  const footer=document.getElementById('footerVideos');
  footer.innerHTML='';
  approvedVideos.filter(v=>!cid||v.channelId===cid).forEach((video,idx)=>{
    const card=document.createElement('div');
    card.className='footer-card';
    card.dataset.vid=video.id;
    card.innerHTML=`
      <img src="https://img.youtube.com/vi/${video.id}/mqdefault.jpg">
      <span class="footer-play">▶</span>
      <div class="footer-card-title">${video.title}</div>`;
    card.onclick=()=>{ currentIndex=idx; playApproved(video.id); };
    footer.appendChild(card);
  });
}

function scrollApproved(x){ document.getElementById('approvedList').scrollBy({left:x,behavior:'smooth'}); }
function scrollFooter(x){ document.getElementById('footerVideos').scrollBy({left:x,behavior:'smooth'}); }


</script>
</body>
</html>
